name: Dependency Bootstrap Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-bootstrap:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Ensure pip exists
        run: python -m ensurepip --upgrade

      - name: Install dependencies (with fallback)
        shell: bash
        run: |
          set -euo pipefail
          if ! python -m pip install -r requirements.txt; then
            python - <<'PY'
            import pathlib, re, subprocess, sys
            req = pathlib.Path("requirements.txt")
            failures = []
            for line in req.read_text(encoding="utf-8").splitlines():
                line = line.strip()
                if not line or line.startswith("#"):
                    continue
                pkg = re.match(r"^([A-Za-z0-9_][A-Za-z0-9_.-]*)", line)
                if not pkg:
                    continue
                name = pkg.group(1)
                r = subprocess.run([sys.executable, "-m", "pip", "install", name], text=True)
                if r.returncode != 0:
                    failures.append(name)
            if failures:
                print("Failed packages:", ", ".join(failures))
                sys.exit(1)
            PY
          fi

      - name: Verify startup dependency check
        run: python -m lirox --version
