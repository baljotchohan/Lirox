name: Dependency Bootstrap Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-bootstrap:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Ensure pip exists
        run: python -m ensurepip --upgrade

      - name: Install dependencies (with fallback)
        shell: bash
        run: |
          set -euo pipefail
          if ! python -m pip install -r requirements.txt; then
          python - <<'PY'
          import pathlib, re, shlex, subprocess, sys

          req = pathlib.Path("requirements.txt")
          requirements = []
          for raw in req.read_text(encoding="utf-8").splitlines():
              line = raw.strip()
              if not line or line.startswith("#"):
                  continue
              requirement = re.sub(r"\s+#.*$", "", line).strip()
              if not requirement:
                  continue
              requirements.append(requirement)

          failures = []
          for requirement in requirements:
              install_args = shlex.split(requirement) if requirement.startswith("-") else [requirement]
              success = False
              for attempt in (1, 2):
                  result = subprocess.run(
                      [sys.executable, "-m", "pip", "install", *install_args],
                      capture_output=True,
                      text=True,
                  )
                  if result.returncode == 0:
                      success = True
                      break
                  if attempt == 1:
                      print(f"Retrying install for {requirement} after initial failure...")
              if not success:
                  stderr = (result.stderr or "").strip()
                  failures.append((requirement, stderr.splitlines()[-1] if stderr else "unknown pip error"))

          if failures:
              print("Failed packages after fallback attempts:")
              for pkg, reason in failures:
                  print(f"  - {pkg}: {reason}")
              sys.exit(1)
          PY
          fi

      - name: Verify startup dependency check
        run: python -m lirox --version

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Run file creation tests
        run: python -m pytest tests/test_document_creators.py -v
