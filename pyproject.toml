[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lirox"
version = "0.8.5"
description = "Lirox — Autonomous AI Agent OS"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
keywords = ["ai", "agent", "autonomous", "llm", "cli"]

dependencies = [
    "rich>=13.0",
    "prompt_toolkit>=3.0",
    "psutil>=5.9",
    "requests>=2.28",
    "python-dotenv>=1.0",
    "beautifulsoup4>=4.12",
    "lxml>=4.9",
]

[project.optional-dependencies]
gemini = ["google-generativeai>=0.5"]
schedule = ["schedule>=1.2"]
dev = ["pytest>=7.0", "pytest-asyncio", "black", "ruff"]

[project.scripts]
lirox = "lirox.main:main"

[project.urls]
Homepage = "https://github.com/lirox-ai/lirox"

[tool.setuptools.packages.find]
where = ["."]
include = ["lirox*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
